<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ApplyDesk Cloud | Search Jobs</title>
    <link rel="stylesheet" href="/app/styles.css">
</head>

<body data-page="search" data-requires-auth="true">
    <div class="page-shell">
        <header class="app-header">
            <div class="topbar">
                <a class="brand" href="/">
                    <span class="brand__mark">AD</span>
                    <span class="brand__text">
                        <strong>ApplyDesk Cloud</strong>
                        <span>Search</span>
                    </span>
                </a>

                <nav class="topbar__nav" aria-label="Primary">
                    <a href="/">Home</a>
                    <a href="/app/account">Dashboard</a>
                    <a href="/app/search" aria-current="page">Search</a>
                    <a href="/app/alerts">Alerts</a>
                </nav>

                <div class="topbar__actions">
                    <span class="session-user" data-session-email>Login required</span>
                    <a class="button button--primary" data-guest-only href="/login">Log In</a>
                    <a class="button button--primary" data-auth-only hidden href="/app/alerts">Alerts</a>
                    <button type="button" class="button button--ghost" data-signout hidden>Log Out</button>
                </div>
            </div>

        </header>

        <main class="site-main">

            <section data-protected-content>
                <section class="workspace-shell">
                    <div class="workspace-header">
                        <div>
                            <p class="section-heading__eyebrow">Search</p>
                            <h2>Search and review results.</h2>
                            <p>Run a search. Check fit. Save filters.</p>
                        </div>

                        <div class="workspace-badges">
                            <span>Fit scoring</span>
                            <span>Pagination</span>
                            <span>Saved filters</span>
                        </div>
                    </div>

                    <section class="layout">
                        <section class="panel panel--form">
                            <div class="panel__header">
                                <div>
                                    <h2>Filters</h2>
                                    <p class="muted">Set role, location, and fit.</p>
                                </div>
                                <button type="button" id="reset-filters" class="button button--ghost">Reset</button>
                            </div>

                            <form id="search-form" class="form-grid">
                                <label class="field field--full">
                                    <span>Job title</span>
                                    <input name="title" type="text" placeholder="Product Manager">
                                </label>

                                <label class="field">
                                    <span>Location</span>
                                    <input name="location" type="text" placeholder="Bengaluru">
                                </label>

                                <label class="field">
                                    <span>Jobs per page</span>
                                    <input name="rows" type="number" min="1" max="1000" value="10">
                                </label>

                                <label class="field">
                                    <span>Page number</span>
                                    <input name="pageNumber" type="number" min="1" max="1000" value="1">
                                </label>

                                <label class="field">
                                    <span>Posted within</span>
                                    <select name="publishedAt">
                                        <option value="">Any time</option>
                                        <option value="r86400">Past 24 hours</option>
                                        <option value="r604800">Past week</option>
                                        <option value="r2592000">Past month</option>
                                    </select>
                                </label>

                                <label class="field">
                                    <span>Company names</span>
                                    <input name="companyName" type="text" placeholder="Google, Microsoft">
                                </label>

                                <label class="field">
                                    <span>Company IDs</span>
                                    <input name="companyId" type="text" placeholder="76987811, 1815218">
                                </label>

                                <label class="field">
                                    <span class="field__header">
                                        <span>Work type</span>
                                    </span>
                                    <select name="workType">
                                        <option value="">Any work type</option>
                                        <option value="1">On-site</option>
                                        <option value="2">Remote</option>
                                        <option value="3">Hybrid</option>
                                    </select>
                                </label>

                                <label class="field">
                                    <span class="field__header">
                                        <span>Contract type</span>
                                    </span>
                                    <select name="contractType">
                                        <option value="">Any contract</option>
                                        <option value="F">Full-time</option>
                                        <option value="P">Part-time</option>
                                        <option value="C">Contract</option>
                                        <option value="T">Temporary</option>
                                        <option value="V">Volunteer</option>
                                        <option value="I">Internship</option>
                                    </select>
                                </label>

                                <label class="field">
                                    <span class="field__header">
                                        <span>Experience level</span>
                                    </span>
                                    <select name="experienceLevel">
                                        <option value="">Any experience level</option>
                                        <option value="1">Internship</option>
                                        <option value="2">Entry level</option>
                                        <option value="3">Associate</option>
                                        <option value="4">Mid-Senior level</option>
                                        <option value="5">Director</option>
                                    </select>
                                </label>

                                <label class="field">
                                    <span>Resume URL</span>
                                    <input name="resumeUrl" type="url" placeholder="https://example.com/resume.pdf">
                                </label>

                                <label class="field field--full">
                                    <span class="field__header">
                                        <span>Resume file</span>
                                        <button type="button" class="field__clear"
                                            data-reset-target="resumeFile">Clear</button>
                                    </span>
                                    <input name="resumeFile" type="file"
                                        accept=".pdf,.docx,.txt,.md,.html,.htm,.json,text/plain,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
                                    <span id="resume-file-state" class="field__hint">No file selected</span>
                                </label>

                                <label class="field">
                                    <span>Min score</span>
                                    <input name="resumeMatchMinScore" type="number" min="1" max="10" step="0.1"
                                        placeholder="7">
                                </label>

                                <label class="field">
                                    <span>Max score</span>
                                    <input name="resumeMatchMaxScore" type="number" min="1" max="10" step="0.1"
                                        placeholder="10">
                                </label>

                                <label class="field">
                                    <span>Search delay ms</span>
                                    <input name="requestDelayMs" type="number" min="0" max="10000" value="600">
                                </label>

                                <label class="field">
                                    <span>Detail loading</span>
                                    <input name="detailConcurrency" type="number" min="1" max="10" value="3">
                                </label>

                                <label class="field field--toggle field--full">
                                    <span>Hide applied jobs</span>
                                    <input id="hide-applied" type="checkbox" checked>
                                </label>

                                <div class="actions field--full">
                                    <button type="submit" id="search-button" class="button button--primary"
                                        style="width: 100%;">Search Jobs</button>
                                </div>
                            </form>
                        </section>

                        <section class="panel panel--results">
                            <div class="panel__header panel__header--results">
                                <div>
                                    <h2>Results</h2>
                                    <p id="results-summary" class="muted">Run a search to load jobs.</p>
                                </div>
                                <div class="results-toolbar">
                                    <label class="results-sort" for="results-sort">
                                        <span>Sort</span>
                                        <select id="results-sort">
                                            <option value="api">Select Order</option>
                                            <option value="match-desc">Match score high to low</option>
                                            <option value="match-asc">Match score low to high</option>
                                        </select>
                                    </label>
                                    <button type="button" id="open-visible" class="button button--ghost">Open Visible
                                        Jobs</button>
                                    <button type="button" id="clear-applied" class="button button--ghost">Clear Applied
                                        Marks</button>
                                </div>
                            </div>

                            <div id="status-banner" class="status-banner" hidden></div>
                            <div id="results-list" class="results-list"></div>

                            <div class="pagination-footer"
                                style="display: none; padding: 24px 24px 32px; gap: 12px; justify-content: center; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 24px;">
                                <button type="button" id="previous-page" class="button button--ghost"
                                    style="min-width: 140px;">← Previous</button>
                                <button type="button" id="next-page" class="button button--primary"
                                    style="min-width: 140px;">Next →</button>
                            </div>
                        </section>
                    </section>
                </section>
            </section>
        </main>
    </div>

    <template id="job-card-template">
        <article class="job-card">
            <div class="job-card__top">
                <div class="job-card__info">
                    <img class="job-card__logo" alt="logo" hidden>
                    <div>
                        <div class="job-card__meta"></div>
                        <h3 class="job-card__title"></h3>
                        <div class="job-card__company"></div>
                    </div>
                </div>
                <div class="job-card__score"></div>
            </div>

            <div class="job-card__chips"></div>

            <button type="button" class="job-card__breakdown-toggle" hidden>
                <span class="job-card__breakdown-toggle-label">Show match details</span>
                <span class="job-card__breakdown-toggle-icon">▾</span>
            </button>
            <div class="job-card__breakdown" hidden></div>

            <div class="job-card__actions">
                <a class="button button--primary job-card__apply" target="_blank" rel="noreferrer">Open job</a>
                <button type="button" class="button button--ghost job-card__toggle">Mark applied</button>
            </div>
        </article>
    </template>

    <script type="module" src="/app/app.js"></script>
</body>

</html>
