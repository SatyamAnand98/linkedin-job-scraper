<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ApplyDesk Cloud | Simple Email Login</title>
    <link rel="stylesheet" href="/app/styles.css">
</head>
<body data-page="login" data-auth-mode="login" data-auth-redirect="/app/account">
    <div class="page-shell">
        <header class="app-header">
            <div class="topbar">
                <a class="brand" href="/">
                    <span class="brand__mark">AD</span>
                    <span class="brand__text">
                        <strong>ApplyDesk Cloud</strong>
                        <span>Email OTP login</span>
                    </span>
                </a>

                <nav class="topbar__nav" aria-label="Primary">
                    <a href="/">Home</a>
                    <a href="/login" aria-current="page">Log In</a>
                    <a href="/terms">Terms</a>
                    <a href="/contact">Contact</a>
                </nav>

                <div class="topbar__actions">
                    <span class="session-user" data-session-email>Email OTP</span>
                    <a class="button button--primary" data-auth-only hidden href="/app/account">Dashboard</a>
                    <button type="button" class="button button--ghost" data-signout hidden>Log Out</button>
                </div>
            </div>
        </header>

        <main class="site-main">
            <section class="auth-layout auth-layout--single">
                <section class="auth-panel auth-panel--form auth-panel--plain">
                    <div class="auth-card">
                        <div class="auth-card__header">
                            <div>
                                <p class="section-heading__eyebrow">Login</p>
                                <h1>Log in with email.</h1>
                                <p class="muted">Request OTP. Verify. Continue.</p>
                            </div>
                        </div>

                        <div id="status-banner" class="status-banner" hidden></div>

                        <form id="account-form" class="form-grid form-grid--auth">
                            <label class="field field--full">
                                <span>Email</span>
                                <input name="signupEmail" type="email" placeholder="you@example.com" autocomplete="email">
                            </label>

                            <div class="actions actions--auth field--full">
                                <button type="button" id="request-otp" class="button button--ghost">Send OTP</button>
                            </div>

                            <label class="field field--full" data-otp-field hidden>
                                <span>One-time password</span>
                                <input name="signupOtp" type="text" inputmode="numeric" maxlength="6" placeholder="123456" disabled>
                                <span class="field__hint" data-otp-hint>Request OTP first.</span>
                            </label>

                            <div class="actions actions--auth field--full" data-otp-submit hidden>
                                <button type="button" id="verify-otp" class="button button--primary">Continue</button>
                            </div>
                        </form>
                    </div>
                </section>
            </section>
        </main>

        <footer class="site-footer">
            <div class="site-footer__brand">
                <strong>ApplyDesk Cloud</strong>
                <p>One login flow.</p>
            </div>

            <nav class="site-footer__nav" aria-label="Footer">
                <a href="/">Home</a>
                <a href="/terms">Terms &amp; Conditions</a>
                <a href="/contact">Contact Us</a>
            </nav>
        </footer>
    </div>

    <script type="module" src="/app/app.js"></script>
</body>
</html>
