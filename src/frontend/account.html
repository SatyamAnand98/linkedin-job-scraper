<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ApplyDesk Cloud | Dashboard</title>
    <link rel="stylesheet" href="/app/styles.css">
</head>

<body data-page="account" data-requires-auth="true">
    <div class="page-shell">
        <header class="app-header">
            <div class="topbar">
                <a class="brand" href="/">
                    <span class="brand__mark">AD</span>
                    <span class="brand__text">
                        <strong>ApplyDesk Cloud</strong>
                        <span>Dashboard</span>
                    </span>
                </a>

                <nav class="topbar__nav" aria-label="Primary">
                    <a href="/">Home</a>
                    <a href="/app/account" aria-current="page">Dashboard</a>
                    <a href="/app/search">Search</a>
                    <a href="/app/alerts">Alerts</a>
                </nav>

                <div class="topbar__actions">
                    <span class="session-user" data-session-email>Login required</span>
                    <a class="button button--primary" data-guest-only href="/login">Log In</a>
                    <a class="button button--primary" data-auth-only hidden href="/app/search">Search</a>
                    <button type="button" class="button button--ghost" data-signout hidden>Log Out</button>
                </div>
            </div>

        </header>

        <main class="site-main">

            <section data-protected-content>
                <div id="status-banner" class="status-banner" hidden></div>

                <section class="dashboard-grid">
                    <article class="dashboard-card dashboard-card--wide">
                        <div class="dashboard-card__header">
                            <div>
                                <span class="dashboard-card__label">Your account</span>
                                <h2 data-session-name>ApplyDesk user</h2>
                                <p class="muted">Signed in and ready.</p>
                            </div>
                            <div class="workspace-badges">
                                <span data-session-state>Signed in</span>
                                <span>Verified</span>
                            </div>
                        </div>

                        <form id="account-form" class="form-grid">
                            <label class="field field--full">
                                <span>API key</span>
                                <input id="api-key" name="apiKey" type="password" autocomplete="off" readonly
                                    placeholder="Your active API key">
                            </label>

                            <label class="field">
                                <span>Name</span>
                                <input name="signupName" type="text" autocomplete="name"
                                    placeholder="How you want your profile to appear">
                            </label>

                            <label class="field">
                                <span>Email</span>
                                <input name="signupEmail" type="email" readonly
                                    placeholder="Loaded from your verified session">
                            </label>

                            <label class="field field--full">
                                <span>Phone number</span>
                                <input name="phoneNumber" type="tel" inputmode="tel" autocomplete="tel"
                                    placeholder="+1 415 555 0199">
                                <span class="field__hint">Optional. Add it now to unlock upcoming features as they roll out.</span>
                            </label>

                            <div class="actions field--full">
                                <button type="submit" id="save-profile" class="button button--primary">Save profile</button>
                                <button type="button" id="refresh-session" class="button button--ghost"
                                    title="Re-sync your session data from the server">↻ Refresh Session</button>
                            </div>
                        </form>
                    </article>

                    <article class="dashboard-card">
                        <span class="dashboard-card__label">Next</span>
                        <h3>Search</h3>
                        <p>Find jobs and check fit.</p>
                        <a class="button button--ghost" href="/app/search">Search</a>
                    </article>

                    <article class="dashboard-card">
                        <span class="dashboard-card__label">Alerts</span>
                        <h3>Alerts</h3>
                        <p>Save searches and get updates.</p>
                        <a class="button button--ghost" href="/app/alerts">Alerts</a>
                    </article>
                </section>
            </section>
        </main>
    </div>

    <script type="module" src="/app/app.js"></script>
</body>

</html>
